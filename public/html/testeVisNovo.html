<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Ícones (64x64)</title>
    <style>
        body {
            background-color: #222;
            color: #ddd;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        /* Ajuste do CSS para exibir o canvas pequeno sem esticar */
        canvas {
            border: 1px solid #555;
            /* Opcional: deixar a renderização mais nítida para pixel art/ícones */
            image-rendering: auto; 
            width: 64px; 
            height: 64px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            /* Removidos os max-width/height antigos que esticavam o canvas */
        }
        .canvas-container {
            /* Um container para dar destaque ao ícone pequeno */
            padding: 20px;
            background: #333;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .controls { text-align: center; }
        button {
            padding: 8px 15px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            color: #fff;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        p.label { font-size: 0.8em; margin-bottom: 5px; color: #aaa;}
    </style>
</head>
<body>

    <div class="canvas-container">
        <canvas id="canvas" width="320" height="320"></canvas>
    </div>

    <div class="controls">
        <p class="label">Estilos:</p>
        <button style="background-color: #00CCFF; color: #000;" onclick="mudarEstilo(EstiloSeta)">Seta</button>
        <button style="background-color: #f9a825; color: #000;" onclick="mudarEstilo(EstiloVanGogh)">Van Gogh</button>
        <button style="background-color: #d84315;" onclick="mudarEstilo(EstiloMaple)">Maple</button>
        
        <p class="label">Geradores:</p>
        <button style="background-color: #444;" onclick="mudarSeedVisual()">Nova Seed</button>
        <button style="background-color: #666;" onclick="gerarNovoInput()">Novo Input</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        // O JS pega automaticamente o novo tamanho (64)
        const w = canvas.width;
        const h = canvas.height;

        // --- Configurações Gerais Ajustadas para 64px ---
        
        // MUDANÇA 2: Reduzir drasticamente a quantidade de elementos
        // 4000 é muito para 64px. Vamos tentar 250.
        const TAMANHO_ARRAY = 4000; 
        const DENSIDADE = 0.01; // Aumentei levemente a densidade para compensar o menor número total
        
        let seedGlobal = 12345; 
        let vetorBinario = [];

        // ==========================================
        //  DEFINIÇÃO DOS OBJETOS DE ESTILO (STRATEGY)
        // ==========================================

        const EstiloSeta = {
            id: 'seta',
            fundo: '#050505',
            cores: ['#FF0055', '#00CCFF', '#FFCC00', '#FFFFFF'], 
            desenhar: function(ctx, r) {
                // Para ícones pequenos, linhas muito finas somem.
                // Ajustei o lineWidth para ser proporcional ao raio, mas no mínimo 0.5
                ctx.lineWidth = Math.max(0.5, r * 0.3);
                ctx.beginPath();
                ctx.moveTo(-r, -r); 
                ctx.lineTo(r, 0);       
                ctx.lineTo(-r, r);  
                ctx.stroke();
            }
        };

        const EstiloVanGogh = {
            id: 'vangogh',
            fundo: '#0b0b0b',
            cores: ['#1a237e', '#ffeb3b', '#29b6f6', '#f4511e', '#ffffff'],
            desenhar: function(ctx, r) {
                // Novo path fornecido (composto por dois traços)
                const pathString = "m -6.99087,30.541962 c 0,0 -3.404838,4.697794 -3.1628,7.313775 0.2420377,2.615981 4.598059,3.062213 3.1223155,0.103997 -1.4757435,-2.958216 0.040484,-7.417772 0.040484,-7.417772 z";
                
                const p = new Path2D(pathString);
                
                ctx.save();
                
                // --- Cálculo de Escala e Centralização ---
                
                // 1. Escala: O SVG tem altura aprox de 8 unidades. 
                // Queremos que ele ocupe cerca de 3x o raio (r).
                const scale = (r * 3) / 8; 
                ctx.scale(scale, scale);
                
                // 2. Translação: O SVG está desenhado perto de Y=34 e X=-9.
                // Precisamos trazê-lo para o ponto (0,0) antes de desenhar.
                // movemos +9 em X e -34 em Y.
                ctx.translate(9, -34); 

                ctx.fill(p);
                ctx.restore();
            }
        };

        const EstiloMaple = {
            id: 'maple',
            fundo: '#f0f0eb',
            cores: ['#d84315', '#f9a825', '#4e342e', '#c62828'],
            desenhar: function(ctx, r) {
                const svgPath = "m 4.6610108,12.832431 c 0.039033,-0.865773 0.092097,-1.732439 0.09231,-2.599034 C 4.742439,9.7811669 4.097911,10.122714 3.635895,10.265625 3.3157177,10.360641 2.2761782,10.775834 2.6851526,10.080468 2.9565359,9.643859 2.6555058,9.2018414 2.4153006,8.9854432 1.6254878,8.3433704 0.83858022,7.6977338 0.04948692,7.0547775 0.30119488,6.8922694 0.78194803,6.8521555 0.76825202,6.4875677 0.62030362,5.9360569 0.39752862,5.4061085 0.26274096,4.8511027 0.8203732,4.9407507 1.3729872,5.1773828 1.9311891,5.1868079 2.5256722,4.3259209 2.0352898,3.9768866 2.6731018,4.7136079 3.0403305,5.051721 3.5649243,6.1349956 3.9833284,6.3875363 4.0097156,5.244923 3.4986143,3.4316954 3.351519,2.4167501 3.7385216,2.5445222 4.3862347,3.3542629 4.6224762,2.7033876 4.9360226,2.1189206 5.2201779,1.5190957 5.5362403,0.93601797 5.9006191,1.6025357 6.2132339,2.2969261 6.5929102,2.9550474 6.9545193,3.051689 7.5193514,2.3919733 7.7154353,2.4907071 7.5321101,3.5240215 6.9813415,5.2550815 6.8114634,6.290544 6.6843043,6.8556773 7.9088692,5.2064325 8.2117464,4.9094949 8.7937774,4.3388782 8.79443,4.223752 8.9426301,4.8713649 c 0.1515801,0.6623832 0.9390402,0.1654475 1.3875669,0.089222 0.358165,-0.060868 0.525699,-0.2013095 0.377378,0.2615162 -0.155385,0.4848685 -0.641601,1.1579806 -0.226421,1.5758977 0.0878,0.1278461 0.847729,0.023986 0.417199,0.3599381 C 9.9963051,7.9054682 8.2169823,8.79667 8.1878051,9.3970929 8.1730686,9.8052749 8.8721046,10.711106 8.0539059,10.384192 7.8098427,10.302327 7.1230839,9.9480204 6.4493065,10.027225 c -0.3471371,0.04262 -0.2846032,0.369034 -0.2676776,0.6152 0.027657,0.739295 0.065646,1.478402 0.081794,2.217971 -0.1641673,-0.01294 -1.4545481,0.03093 -1.6024126,-0.02797 z";
                const p = new Path2D(svgPath);
                ctx.save();
                const scaleFactor = (r * 2.5) / 11;
                ctx.scale(scaleFactor, scaleFactor);
                ctx.translate(-5.5, -6.5);
                ctx.fill(p);
                ctx.restore();
            }
        };

        let estiloAtual = EstiloVanGogh;

        // ==========================================
        //  ENGINE DE GERAÇÃO
        // ==========================================

        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296; 
            }
        }

        function criarVetorBinario() {
            const arr = [];
            for(let i=0; i < TAMANHO_ARRAY; i++) {
                arr.push(Math.random() < DENSIDADE ? 1 : 0);
            }
            return arr;
        }

        function desenhar() {
            ctx.fillStyle = estiloAtual.fundo;
            ctx.fillRect(0, 0, w, h);

            const rand = mulberry32(seedGlobal);

            // MUDANÇA 3: Tamanho fixo reduzido
            // 10px era muito grande para um canvas de 64px.
            // 3px é um bom tamanho base para ícones.
            const tamanho = 13;
            const opacidade = 0.7;
            const padding = 15;

            for (let i = 0; i < TAMANHO_ARRAY; i++) {
                const x = rand() * (w-padding*2) + padding;
                const y = rand() * (h-padding*2) + padding;
                const angulo = rand() * Math.PI * 2; 
                const idxCor = Math.floor(rand() * estiloAtual.cores.length);
                rand(); 

                if (vetorBinario[i] === 1) {
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(angulo);
                    
                    const corEscolhida = estiloAtual.cores[idxCor];
                    ctx.fillStyle = corEscolhida;
                    ctx.strokeStyle = corEscolhida;
                    ctx.globalAlpha = opacidade;

                    estiloAtual.desenhar(ctx, tamanho);

                    ctx.restore();
                }
            }
        }

        // --- Funções de Controle ---
        function mudarEstilo(novoObjetoEstilo) {
            estiloAtual = novoObjetoEstilo;
            desenhar();
        }
        function gerarNovoInput() {
            vetorBinario = criarVetorBinario();
            desenhar();
        }
        function mudarSeedVisual() {
            seedGlobal = Math.floor(Math.random() * 1000000);
            desenhar();
        }

        // Inicialização
        vetorBinario = criarVetorBinario();
        desenhar();

    </script>
</body>
</html>
