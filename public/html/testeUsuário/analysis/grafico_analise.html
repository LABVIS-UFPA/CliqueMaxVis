<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Análise de Tarefas - Memória e Similaridade</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    .label {
      font-size: 16px;
      alignment-baseline: middle;
    }

    .dot {
      stroke: black;
      stroke-width: 1px;
    }

    .line {
      stroke: gray;
      stroke-width: 2px;
    }

    .question-label {
      font-weight: bold;
      font-size: 13px;
    }

    h2 {
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <h2>MEMORY</h2>
  <svg id="chart-memory"></svg>
  <br>
  <button onclick="downloadSVG('chart-memory')">Download Memory SVG</button>

  <h2>SIMILARITY</h2>
  <svg id="chart-similarity"></svg>
  <br>
  <button onclick="downloadSVG('chart-similarity')">Download Similarity SVG</button>

  <h2>TREND</h2>
  <svg id="chart-trend"></svg>
  <br>
  <button onclick="downloadSVG('chart-trend')">Download Trend SVG</button>

  <h2>LOOP</h2>
  <svg id="chart-loop"></svg>
  <br>
  <button onclick="downloadSVG('chart-loop')">Download Loop SVG</button>

  <h2>TREND 2 (REPLAY)</h2>
  <svg id="chart-trend2"></svg>
  <br>
  <button onclick="downloadSVG('chart-trend2')">Download Trend 2 SVG</button>

  <script>
    // Mapeamento de cores para as visualizações
    const visualizationColors = {
      "static": "#7f7f7f",
      "particles": "#1f77b4",
      "cnn": "#ff7f0e",
      "scatter": "#2ca02c",
      "sketch": "#d62728",
      "heatmap": "#9467bd"
    };

    // Ordem desejada para a dificuldade
    const difficultyOrder = ["training", "medium", "dense", "high", "convergence", "divergence", "random", "medium2"];

    // Função de Bootstrap para IC de 95%
    function calculateBootstrapStats(values, iterations = 2000) {
      const n = values.length;
      const mean = d3.mean(values);

      if (n < 2) {
        return { mean: mean, lower: mean, upper: mean };
      }

      const means = [];
      for (let i = 0; i < iterations; i++) {
        let sum = 0;
        for (let j = 0; j < n; j++) {
          const idx = Math.floor(Math.random() * n);
          sum += values[idx];
        }
        means.push(sum / n);
      }
      means.sort((a, b) => a - b);
      const lower = means[Math.floor(0.025 * iterations)];
      const upper = means[Math.floor(0.975 * iterations)];

      return { mean, lower, upper };
    }

    function processData(data, columnName) {
      // Agrupar por Difficulty e depois Visualization
      const grouped = d3.group(data, d => d.Difficulty, d => d.Visualization);
      
      console.log(grouped);
      const processed = [];

      // Iterar na ordem definida de dificuldade
      difficultyOrder.forEach(diff => {
        if (grouped.has(diff)) {
          const visGroup = grouped.get(diff);
          // Ordenar visualizações alfabeticamente ou manter ordem de aparição
          const visualizations = Array.from(visGroup.keys()).sort();
          
          visualizations.forEach(vis => {
            const records = visGroup.get(vis);
            let values = records.map(d => d[columnName]);

            if (columnName === 'Reaction_Time_ms' || columnName === 'Lag_Time_ms') {
              values = values.map(v => v / 1000); // Converter para segundos
            }

            const stats = calculateBootstrapStats(values);
            
            processed.push({
              Pergunta: diff, // Usando 'Pergunta' para manter compatibilidade com a lógica de renderização
              estrategia: vis,
              media: stats.mean,
              IC95_inferior: stats.lower,
              IC95_superior: stats.upper
            });
          });
        }
      });

      return processed;
    }

    function renderAccuracyChart(svg, rawData, offsetX, bgWidth, options) {
      const {
        controlewidth = 340,
        col1Header = "Difficulty",
        posStrategyFactor = 0.75,
        posEstimateFactor = 0.43
      } = options || {};

      const margin = { top: 30, right: 40, bottom: 40, left: controlewidth };
      const width = 350;
      const rowHeight = 30;

      const posstrategy = -controlewidth * posStrategyFactor;
      const posestimate = -controlewidth * posEstimateFactor;

      const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

      // Cabeçalhos
      g.append("line")
        .attr("x1", -controlewidth)
        .attr("x2", 0)
        .attr("y1", -5)
        .attr("y2", -5)
        .attr("stroke", "black")
        .attr("stroke-width", 2);

      g.append("text").attr("x", -controlewidth).attr("y", -15).text(col1Header).attr("font-weight", "bold");
      g.append("text").attr("x", posstrategy).attr("y", -15).text("Visualization").attr("font-weight", "bold");
      g.append("text").attr("x", posestimate).attr("y", -15).text("Estimate (95% CI)").attr("font-weight", "bold");

      // Escala X (Acurácia de 0 a 1)
      const x = d3.scaleLinear()
        .domain([0, 1])
        .range([0, width]);

      g.append("text")
        .attr("x", width / 2)
        .attr("y", rowHeight * rawData.length + 45)
        .text("Accuracy")
        .attr("font-weight", "bold")
        .attr("text-anchor", "middle");

      const y = d3.scaleBand()
        .domain(rawData.map((_, i) => i))
        .range([0, rowHeight * rawData.length])
        .padding(0.2);

      // Eixo X
      g.append("g")
        .attr("transform", `translate(0,${rowHeight * rawData.length})`)
        .call(d3.axisBottom(x).ticks(5).tickFormat(d3.format(".0%")))
        .selectAll("text").style("font-size", "11pt");

      // Linhas de IC
      g.selectAll(".line")
        .data(rawData)
        .enter()
        .append("line")
        .attr("class", "line")
        .attr("x1", d => x(d.IC95_inferior))
        .attr("x2", d => x(d.IC95_superior))
        .attr("y1", (d, i) => y(i) + y.bandwidth() / 2)
        .attr("y2", (d, i) => y(i) + y.bandwidth() / 2)
        .style("stroke", d => visualizationColors[d.estrategia] || "black");

      // Pontos médios
      g.selectAll(".dot")
        .data(rawData)
        .enter()
        .append("circle")
        .attr("class", "dot")
        .attr("cx", d => x(d.media))
        .attr("cy", (d, i) => y(i) + y.bandwidth() / 2)
        .attr("r", 5)
        .style("fill", d => visualizationColors[d.estrategia] || "black");

      // Labels de texto
      g.selectAll(".estrategia-label")
        .data(rawData)
        .enter()
        .append("text")
        .attr("x", posstrategy)
        .attr("y", (d, i) => y(i) + y.bandwidth() / 2 + 4)
        .style("fill", d => visualizationColors[d.estrategia] || "black")
        .style("font-size", "16px")
        .text(d => d.estrategia);

      g.selectAll(".valor-label")
        .data(rawData)
        .enter()
        .append("text")
        .attr("x", posestimate)
        .attr("y", (d, i) => y(i) + y.bandwidth() / 2 + 4)
        .style("fill", d => visualizationColors[d.estrategia] || "black")
        .style("font-size", "16px")
        .text(d => `${d.media.toFixed(2)} (${d.IC95_inferior.toFixed(2)} - ${d.IC95_superior.toFixed(2)})`);

      // Agrupamento visual por Dificuldade (Retângulos de fundo e Labels)
      const perguntasUnicas = [...new Set(rawData.map(d => d.Pergunta))];
      perguntasUnicas.forEach((pergunta, idx) => {
        const indices = rawData.map((d, i) => ({ i, pergunta: d.Pergunta }))
          .filter(d => d.pergunta === pergunta)
          .map(d => d.i);

        const perguntaData = rawData.filter(d => d.Pergunta === pergunta);
        const firstIndex = indices[0];
        const lastIndex = indices[indices.length - 1];
        
        // Retângulo de fundo alternado
        g.insert("rect", ":first-child")
          .attr("x", -controlewidth)
          .attr("y", y(firstIndex) - 5)
          .attr("width", bgWidth)
          .attr("height", (y(lastIndex) + y.bandwidth()) - y(firstIndex) + 10)
          .attr("fill", idx % 2 === 0 ? "#f0f0f0" : "white")
          .attr("opacity", 0.5);

        const yMean = d3.mean(indices, i => y(i) + y.bandwidth() / 2);

        g.append("text")
          .attr("x", -controlewidth + 5)
          .attr("y", yMean + 4)
          .attr("text-anchor", "start")
          .style("font-weight", "bold")
          .text(pergunta);
      });
    }

    function renderTimeChart(svg, rawData, offsetX, customHeader = "Time (s)") {
      const controlewidth = 170;
      const margin = { top: 30, right: 40, bottom: 40, left: controlewidth };
      const width = 350;
      const rowHeight = 30;

      const posestimate = -controlewidth * 0.90;

      const g = svg.append("g").attr("transform", `translate(${offsetX + margin.left},${margin.top})`);

      // Cabeçalhos
      g.append("line")
        .attr("x1", posestimate)
        .attr("x2", 1)
        .attr("y1", -5)
        .attr("y2", -5)
        .attr("stroke", "black")
        .attr("stroke-width", 2);

      g.append("text").attr("x", posestimate).attr("y", -15).text("Estimate (95% CI)").attr("font-weight", "bold");

      const maxValue = d3.max(rawData, d => d.IC95_superior);

      // Escala X
      const x = d3.scaleLinear()
        .domain([0, maxValue]) // Domain termina exatamente no valor máximo
        .range([0, width]);

      // Gera os valores dos ticks para garantir que o último seja o valor máximo
      // .ticks(5) sugere 6 ticks (incluindo 0)
      const tickValues = x.ticks(5); 
      tickValues[tickValues.length - 1] = maxValue; // Garante que o último tick é o valor máximo exato

      g.append("text")
        .attr("x", width / 2)
        .attr("y", rowHeight * rawData.length + 45)
        .text(customHeader)
        .attr("font-weight", "bold")
        .attr("text-anchor", "middle");

      const y = d3.scaleBand()
        .domain(rawData.map((_, i) => i))
        .range([0, rowHeight * rawData.length])
        .padding(0.2);

      // Eixo X
      g.append("g")
        .attr("transform", `translate(0,${rowHeight * rawData.length})`)
        .call(d3.axisBottom(x).tickValues(tickValues).tickFormat(d => d.toFixed(1)))
        .selectAll("text").style("font-size", "11pt");

      // Linhas de IC
      g.selectAll(".line")
        .data(rawData)
        .enter()
        .append("line")
        .attr("class", "line")
        .attr("x1", d => x(d.IC95_inferior))
        .attr("x2", d => x(d.IC95_superior))
        .attr("y1", (d, i) => y(i) + y.bandwidth() / 2)
        .attr("y2", (d, i) => y(i) + y.bandwidth() / 2)
        .style("stroke", d => visualizationColors[d.estrategia] || "black");

      // Pontos médios
      g.selectAll(".dot")
        .data(rawData)
        .enter()
        .append("circle")
        .attr("class", "dot")
        .attr("cx", d => x(d.media))
        .attr("cy", (d, i) => y(i) + y.bandwidth() / 2)
        .attr("r", 5)
        .style("fill", d => visualizationColors[d.estrategia] || "black");

      // Labels de texto
      g.selectAll(".valor-label")
        .data(rawData)
        .enter()
        .append("text")
        .attr("x", posestimate)
        .attr("y", (d, i) => y(i) + y.bandwidth() / 2 + 4)
        .style("fill", d => visualizationColors[d.estrategia] || "black")
        .style("font-size", "16px")
        .text(d => `${d.media.toFixed(1)} (${d.IC95_inferior.toFixed(1)} - ${d.IC95_superior.toFixed(1)})`);
    }


    function downloadSVG(svgId) {
      const svgElement = document.getElementById(svgId);
      if (!svgElement) {
        console.error("SVG não encontrado");
        return;
      }
      const serializer = new XMLSerializer();
      const svgString = serializer.serializeToString(svgElement);
      const blob = new Blob([svgString], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = svgId + ".svg";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Main logic
    // --- LÓGICA PRINCIPAL (JSON) ---

    // Caminho definido no server.js (pasta analysis/results)
    const jsonFilePath = "./results/global_results.json";//"./results/pilot_results.json";//"./results/global_results.json"; 

    d3.json(jsonFilePath).then(allLogs => {
      console.log(`Carregado ${allLogs.length} registros de: ${jsonFilePath}`);
      
      // Validação básica: se o arquivo vier vazio ou nulo
      if (!allLogs || !Array.isArray(allLogs)) {
        console.error("Formato de arquivo inválido ou vazio.");
        return;
      }

      // 1. FILTRAGEM E MAPEAMENTO
      // Transformamos o formato do log bruto (d.diff, d.vis, d.rt) 
      // para o formato esperado pelos gráficos (Difficulty, Visualization, Reaction_Time_ms)

      // --- MEMORY ---
      const memoryData = allLogs
        .filter(d => d.task === 'memory' && d.type !== 'questionnaire' && d.diff !== 'training')
        .map(d => ({
          Difficulty: d.diff,
          Visualization: d.vis,
          Is_Correct: d.correct ? 1 : 0,
          Reaction_Time_ms: d.rt
        }));

      // --- SIMILARITY ---
      const similarityData = allLogs
        .filter(d => d.task === 'similarity' && d.type !== 'questionnaire' && d.diff !== 'training')
        .map(d => ({
          Difficulty: d.diff,
          Visualization: d.vis,
          Is_Correct: d.correct ? 1 : 0,
          Reaction_Time_ms: d.rt
        }));

      // --- TREND ---
      const trendData = allLogs
        .filter(d => d.task === 'trend' && d.type !== 'questionnaire' && d.diff !== 'training')
        .map(d => ({
          // Na Trend, o 'Gabarito' (Cenário) define a dificuldade lógica
          // Difficulty: (d.details && d.details.correct) ? d.details.correct : "unknown",
          Difficulty: d.diff,
          Visualization: d.vis,
          Is_Correct: d.correct ? 1 : 0,
          Reaction_Time_ms: d.rt
        }));

      // --- LOOP ---
      // const loopData = allLogs
      //   .filter(d => d.task === 'loop' && d.type !== 'questionnaire' && d.diff !== 'training')
      //   .map(d => ({
      //     Difficulty: d.diff,
      //     Visualization: d.vis,
      //     // Verifica se foi HIT (Acerto Real)
      //     Is_Correct: (d.details && d.details.outcome === 'HIT') ? 1 : 0,
      //     // LagTime (atraso da percepção)
      //     Lag_Time_ms: (d.details && d.details.lagTime) ? d.details.lagTime : 0 
      //   }))
      //   // Filtra apenas acertos para o gráfico de tempo (Lag), pois erro não tem lag válido
      //   .filter(d => d.Is_Correct === 1); 
      // 1. Dataset Completo (Para calcular Acurácia: considera erros e acertos)
      const loopDataAll = allLogs
        .filter(d => d.task === 'loop' && d.type !== 'questionnaire' && d.diff !== 'training')
        .map(d => ({
          Difficulty: d.diff,
          Visualization: d.vis,
          // Verifica se foi HIT (Acerto Real)
          Is_Correct: (d.details && d.details.outcome === 'HIT') ? 1 : 0,
          // LagTime (atraso da percepção) - mantemos null se errou
          Lag_Time_ms: (d.details && d.details.lagTime) ? d.details.lagTime : null 
        }));

      // 2. Dataset Filtrado (Para calcular Tempo: considera APENAS acertos)
      // Se incluíssemos os erros (tempo 0 ou null), a média de tempo ficaria errada.
      const loopDataHits = loopDataAll.filter(d => d.Is_Correct === 1);


      // --- PROCESSAMENTO DADOS: TREND 2 ---
      const trend2Data = allLogs
        .filter(d => d.task === 'trend2' && d.type !== 'questionnaire' && d.diff !== 'training')
        .map(d => ({
          // No Trend 2, o que define a dificuldade é o cenário (salvo em details.targetTrend)
          Difficulty: d.diff,
          Visualization: d.vis,
          Is_Correct: d.correct ? 1 : 0,
          Replays: (d.details && d.details.replays) ? d.details.replays : 0,
          Reaction_Time_ms: d.rt
        }));


      // 2. CONFIGURAÇÕES VISUAIS DE PLOTAGEM
      const plotWidth = 350;
      const timeControleWidth = 190;
      const accControleWidthDefault = 340;
      const accWidthDefault = accControleWidthDefault + plotWidth + 40;
      const totalWidthDefault = accWidthDefault + timeControleWidth + plotWidth;

      // --- RENDERIZAÇÃO GRÁFICO MEMORY ---
      const svgMem = d3.select("#chart-memory");
      const accMemData = processData(memoryData, 'Is_Correct');
      const timeMemData = processData(memoryData, 'Reaction_Time_ms');
      const heightMem = 30 * Math.max(accMemData.length, 1) + 80;
      
      svgMem.attr("width", totalWidthDefault).attr("height", heightMem);
      if (accMemData.length > 0) {
        renderAccuracyChart(svgMem, accMemData, 0, totalWidthDefault, { col1Header: "Difficulty" });
        renderTimeChart(svgMem, timeMemData, accWidthDefault);
      }

      // --- RENDERIZAÇÃO GRÁFICO SIMILARITY ---
      const svgSim = d3.select("#chart-similarity");
      const accSimData = processData(similarityData, 'Is_Correct');
      const timeSimData = processData(similarityData, 'Reaction_Time_ms');
      const heightSim = 30 * Math.max(accSimData.length, 1) + 80;

      svgSim.attr("width", totalWidthDefault).attr("height", heightSim);
      if (accSimData.length > 0) {
        renderAccuracyChart(svgSim, accSimData, 0, totalWidthDefault, { col1Header: "Difficulty" });
        renderTimeChart(svgSim, timeSimData, accWidthDefault);
      }

      // --- RENDERIZAÇÃO GRÁFICO TREND ---
      // Trend precisa de mais espaço para os rótulos (Convergence, Divergence...)
      const accControleWidthTrend = 380;
      const accWidthTrend = accControleWidthTrend + plotWidth + 40;
      const totalWidthTrend = accWidthTrend + timeControleWidth + plotWidth;
      const trendOptions = {
        controlewidth: accControleWidthTrend,
        col1Header: "Scenario",
        posStrategyFactor: 0.70,
        posEstimateFactor: 0.39
      };

      const svgTrend = d3.select("#chart-trend");
      const accTrendData = processData(trendData, 'Is_Correct');
      const timeTrendData = processData(trendData, 'Reaction_Time_ms');
      const heightTrend = 30 * Math.max(accTrendData.length, 1) + 80;

      svgTrend.attr("width", totalWidthTrend).attr("height", heightTrend);
      if (accTrendData.length > 0) {
        renderAccuracyChart(svgTrend, accTrendData, 0, totalWidthTrend, { col1Header: "Difficulty" });
        renderTimeChart(svgTrend, timeTrendData, accWidthTrend);
      }

      // --- RENDERIZAÇÃO GRÁFICO LOOP ---
      const svgLoop = d3.select("#chart-loop");
      // Usa 'loopDataAll' para Acurácia (conta erros e acertos)
      const accLoopData = processData(loopDataAll, 'Is_Correct');
      // No Loop, usamos Lag_Time_ms em vez de Reaction Time total
      const timeLoopData = processData(loopDataHits, 'Lag_Time_ms'); 
      const heightLoop = 30 * Math.max(accLoopData.length, 1) + 80;

      svgLoop.attr("width", totalWidthDefault).attr("height", heightLoop);
      if (accLoopData.length > 0) {
        renderAccuracyChart(svgLoop, accLoopData, 0, totalWidthDefault, { col1Header: "Difficulty" });
        renderTimeChart(svgLoop, timeLoopData, accWidthDefault);
      }

      // // --- RENDERIZAÇÃO GRÁFICO TREND 2 ---
      // const svgTrend2 = d3.select("#chart-trend2");
      // const accTrend2Data = processData(trend2Data, 'Is_Correct');
      // const timeTrend2Data = processData(trend2Data, 'Reaction_Time_ms');
      // const heightTrend2 = 30 * Math.max(accTrend2Data.length, 1) + 80;

      // // Reaproveitamos 'totalWidthTrend' e 'trendOptions' pois os rótulos são iguais (Scenario)
      // svgTrend2.attr("width", totalWidthTrend).attr("height", heightTrend2);
      
      // if (accTrend2Data.length > 0) {
      //   renderAccuracyChart(svgTrend2, accTrend2Data, 0, totalWidthTrend, trendOptions);
      //   renderTimeChart(svgTrend2, timeTrend2Data, accWidthTrend);
      // }

      // --- RENDERIZAÇÃO GRÁFICO TREND 2 ---
      const svgTrend2 = d3.select("#chart-trend2");
      
      // Verifica se existem dados antes de processar
      console.log("Dados Trend 2 encontrados:", trend2Data.length);

      if (trend2Data.length === 0) {
          // Se não tiver dados, mostra mensagem de aviso no gráfico
          svgTrend2.attr("width", 400).attr("height", 50);
          svgTrend2.append("text")
            .attr("x", 10).attr("y", 30)
            .text("⚠️ Sem dados de 'trend2' neste arquivo JSON.")
            .style("fill", "red").style("font-family", "sans-serif");
      } else {
          // Se tiver dados, processa e desenha
          const accTrend2Data = processData(trend2Data, 'Is_Correct');
          const timeTrend2Data = processData(trend2Data, 'Replays');
          const heightTrend2 = 30 * Math.max(accTrend2Data.length, 1) + 80;

          console.log(accTrend2Data);

          svgTrend2.attr("width", totalWidthTrend).attr("height", heightTrend2);
          
          if (accTrend2Data.length > 0) {
            renderAccuracyChart(svgTrend2, accTrend2Data, 0, totalWidthTrend, { col1Header: "Difficulty" });
            renderTimeChart(svgTrend2, timeTrend2Data, accWidthTrend, "Replays");
          }
      }



    }).catch(error => {
      console.error("Erro ao carregar o JSON:", error);
      d3.select("body").insert("p", ":first-child")
        .style("color", "red")
        .style("font-weight", "bold")
        .text(`Erro ao carregar: ${jsonFilePath}. Verifique se a pasta 'analysis/results' existe e contém dados.`);
    });
    
  </script>
</body>

</html>
