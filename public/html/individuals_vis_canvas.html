<!DOCTYPE html>
<!-- <script src="https://d3js.org/d3.v7.min.js"></script> -->
<h3>Individual Visualization</h3>
<p id="status">Aguardando dados...</p>
<div id="container">
    <canvas id="canvasMatrix"></canvas>
</div>
<script type="module">

    document.addEventListener("DOMContentLoaded", () => {
        const canvas = document.getElementById("canvasMatrix");
        const ctx = canvas.getContext("2d");

        ctx.font = "8px monospace";
        ctx.fillStyle = "black";
        

        let num_of_generations = 10;


        const width = 500;
        const height = 600;
        // let data = [];




        canvas.width = width + 25;
        canvas.height = height;

        // let colorScale = d3.scaleSequential(d3.interpolateSpectral);
        // let colorScale = d3.scaleSequential(d3.interpolateYlGnBu);
        let extent = [999999, 0];

        const socket = new WebSocket("ws://localhost:3214");


        socket.onmessage = function (event) {
            // console.log(event);
            const message = JSON.parse(event.data);

            switch (message.act) {
                case "log":
                    console.log(message.data);
                    break;
                case "data":
                    // const aux = d3.extent(message.data.population, i => i.fitness);
                    // extent[0] = Math.min(aux[0], extent[0]);
                    // extent[1] = Math.max(aux[1], extent[1]);
                    // colorScale.domain(extent);
                    document.getElementById("status").innerHTML =
                        `Geração: ${message.data.generation}`;
                    drawMatrix(message.data.population);
                    break;
            }

        };

        socket.onopen = function () {
            console.log("Conectado ao servidor WebSocket");
            socket.send(JSON.stringify({ act: "obs", data: ["individuals"] }));
        };


        let isDrawing = false;
        function drawMatrix(population) {
            const matrix = population.map(i => i.nodeMask);
            if (!canvas) {
                console.error("Canvas not found");
                return;
            }
            if (isDrawing) {
                console.error("Frame dropped!");
                return;
            }

            isDrawing = true;
            const rows = matrix.length;
            const cols = matrix[0].length;

            const cellWidth = width / cols;
            const cellHeight = height / rows;

            ctx.clearRect(0, 0, width + 25, height);
            let fit_dif = 0;

            for (let i = 0; i < rows; i++) {
                // ctx.fillStyle = colorScale(population[i].fitness);
                for (let j = 0; j < cols; j++) {
                    // ctx.fillStyle = "black";
                    if (matrix[i][j] === 1) {
                        ctx.fillRect(j * cellWidth, i * cellHeight, cellWidth, cellHeight);
                    }
                    // ctx.fillStyle = colorScale(population[i].fitness);
                    // ctx.fillRect(cols * cellWidth+5, i * cellHeight, 10, cellHeight);

                }
                if (fit_dif !== population[i].fitness) {
                    fit_dif = population[i].fitness;
                    ctx.fillText(population[i].fitness, cols * cellWidth + 5, i * cellHeight + cellHeight-2);
                    ctx.beginPath();

                    // Set a start-point
                    ctx.moveTo(0, i * cellHeight);
                    ctx.lineTo(cols * cellWidth + 5, i * cellHeight);
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }

            }
            isDrawing = false;
        }
    });




</script>
