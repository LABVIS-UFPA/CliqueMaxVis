<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeção MDS de Vetores Binários</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
        }
        .chart-container {
            width: 600px;
            height: 400px;
            margin: 0 auto;
            position: relative;
        }
        .binary-vector {
            font-family: monospace;
            padding: 5px;
            margin: 5px 0;
            background-color: #f9f9f9;
            border-radius: 3px;
        }
        input, button, select {
            padding: 8px;
            margin: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background-color: #45a049;
        }
        .tooltip {
            position: absolute;
            padding: 8px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 4px;
            pointer-events: none;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
        }
        .manual-input {
            margin-top: 15px;
        }
        .manual-vector {
            width: 300px;
            font-family: monospace;
        }
        .highlight {
            stroke: #ff4500;
            stroke-width: 2px;
            r: 7px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Visualização de Vetores Binários com MDS</h1>
        
        <div class="controls">
            <div>
                <label for="numVectors">Número de vetores:</label>
                <input type="number" id="numVectors" min="5" max="200" value="50">
                
                <label for="vectorSize">Tamanho do vetor:</label>
                <input type="number" id="vectorSize" min="3" max="100" value="10">
                
                <label for="probOne">Probabilidade de 1:</label>
                <input type="number" id="probOne" min="0.1" max="0.9" step="0.1" value="0.5">
                
                <button id="generateBtn">Gerar Vetores</button>
            </div>
            
            <div class="manual-input">
                <label for="manualVector">Inserir vetor manualmente (Ex: 1,0,1,0,1...):</label>
                <input type="text" id="manualVector" class="manual-vector" placeholder="1,0,1,0,1...">
                <button id="addVectorBtn">Adicionar Vetor</button>
                <div id="manualVectorStatus"></div>
            </div>
        </div>
        
        <div class="chart-container" id="chart"></div>
        
        <div id="vectorsDisplay">
            <h3>Vetores Gerados:</h3>
            <div id="vectorsList"></div>
        </div>
    </div>
    
    <script>
        // Variáveis globais para armazenar os dados
        let globalVectors = [];
        let globalCoordinates = [];
        
        // Função para calcular a distância de Hamming entre dois vetores binários
        function hammingDistance(vec1, vec2) {
            if (vec1.length !== vec2.length) {
                throw new Error("Vetores devem ter o mesmo tamanho");
            }
            
            let distance = 0;
            for (let i = 0; i < vec1.length; i++) {
                if (vec1[i] !== vec2[i]) {
                    distance++;
                }
            }
            return distance;
        }
        
        // Função para calcular a matriz de distâncias
        function calculateDistanceMatrix(vectors) {
            const n = vectors.length;
            const distMatrix = Array(n).fill().map(() => Array(n).fill(0));
            
            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    const dist = hammingDistance(vectors[i], vectors[j]);
                    distMatrix[i][j] = dist;
                    distMatrix[j][i] = dist; // A matriz é simétrica
                }
            }
            
            return distMatrix;
        }
        
        // Implementação simplificada de MDS (Classical Multidimensional Scaling)
        function classicalMDS(distanceMatrix, dimensions = 2) {
            const n = distanceMatrix.length;
            
            // 1. Calcular matriz ao quadrado
            const D_squared = distanceMatrix.map(row => row.map(d => d * d));
            
            // 2. Centralização da matriz
            // Calcular média de cada linha/coluna
            const rowMeans = D_squared.map(row => row.reduce((sum, val) => sum + val, 0) / n);
            const totalMean = rowMeans.reduce((sum, val) => sum + val, 0) / n;
            
            // Criar matriz de produtos internos B (matriz de Gram)
            const B = Array(n).fill().map(() => Array(n).fill(0));
            
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    B[i][j] = -0.5 * (D_squared[i][j] - rowMeans[i] - rowMeans[j] + totalMean);
                }
            }
            
            // 3. Decomposição espectral (aproximada por power iteration para simplificar)
            // Vamos usar uma versão simplificada do algoritmo de power iteration
            const eigenvalues = [];
            const eigenvectors = [];
            
            // Função auxiliar para normalizar um vetor
            function normalize(vec) {
                const norm = Math.sqrt(vec.reduce((sum, val) => sum + val * val, 0));
                return vec.map(val => val / norm);
            }
            
            // Função para multiplicar matriz por vetor
            function multiplyMatrixVector(matrix, vector) {
                return matrix.map(row => 
                    row.reduce((sum, val, idx) => sum + val * vector[idx], 0)
                );
            }
            
            // Encontrar os autovalores/autovetores dominantes
            for (let d = 0; d < dimensions; d++) {
                // Começar com um vetor aleatório
                let eigenvector = normalize(Array(n).fill().map(() => Math.random()));
                
                // Power iteration (simplificado)
                for (let iter = 0; iter < 50; iter++) {
                    // Para cada autovetor anterior, remover sua componente
                    for (let prev = 0; prev < d; prev++) {
                        const prevEigenvector = eigenvectors[prev];
                        const projection = eigenvector.reduce((sum, val, idx) => sum + val * prevEigenvector[idx], 0);
                        eigenvector = eigenvector.map((val, idx) => val - projection * prevEigenvector[idx]);
                    }
                    
                    // Multiplicar pela matriz B
                    eigenvector = multiplyMatrixVector(B, eigenvector);
                    
                    // Normalizar
                    eigenvector = normalize(eigenvector);
                }
                
                // Calcular o autovalor correspondente
                const Bv = multiplyMatrixVector(B, eigenvector);
                const eigenvalue = eigenvector.reduce((sum, val, idx) => sum + val * Bv[idx], 0);
                
                eigenvalues.push(eigenvalue);
                eigenvectors.push(eigenvector);
            }
            
            // 4. Calcular as coordenadas
            const coordinates = Array(n).fill().map(() => Array(dimensions).fill(0));
            
            for (let i = 0; i < n; i++) {
                for (let d = 0; d < dimensions; d++) {
                    if (eigenvalues[d] > 0) { // Apenas autovalores positivos são válidos
                        coordinates[i][d] = eigenvectors[d][i] * Math.sqrt(eigenvalues[d]);
                    }
                }
            }
            
            return coordinates;
        }
        
        // Função para gerar vetores binários aleatórios
        function generateRandomBinaryVectors(numVectors, vectorSize, probOne = 0.5) {
            return Array(numVectors).fill().map(() => 
                Array(vectorSize).fill().map(() => Math.random() < probOne ? 1 : 0)
            );
        }
        
        // Função para validar e processar o vetor inserido manualmente
        function processManualVector() {
            const vectorInput = document.getElementById("manualVector").value;
            const statusElement = document.getElementById("manualVectorStatus");
            
            // Limpar mensagem de status anterior
            statusElement.textContent = "";
            
            // Verificar se o input está vazio
            if (!vectorInput.trim()) {
                statusElement.textContent = "Por favor, insira um vetor";
                return null;
            }
            
            // Dividir o input por vírgulas e converter para números
            const vector = vectorInput.split(",").map(bit => {
                const num = parseInt(bit.trim());
                return isNaN(num) ? null : num;
            });
            
            // Verificar se todos os elementos são válidos (0 ou 1)
            if (vector.some(bit => bit !== 0 && bit !== 1)) {
                statusElement.textContent = "Vetor inválido. Use apenas 0 e 1 separados por vírgulas";
                return null;
            }
            
            // Verificar se o tamanho do vetor é compatível com os existentes
            if (globalVectors.length > 0 && vector.length !== globalVectors[0].length) {
                statusElement.textContent = `O vetor deve ter tamanho ${globalVectors[0].length}`;
                return null;
            }
            
            statusElement.textContent = "Vetor adicionado com sucesso!";
            return vector;
        }
        
        // Função para adicionar um novo vetor e atualizar a visualização
        function addManualVector() {
            const vector = processManualVector();
            
            if (!vector) return;
            
            // Adicionar o novo vetor aos dados globais
            globalVectors.push(vector);
            
            // Recalcular a matriz de distância e as coordenadas MDS
            const distMatrix = calculateDistanceMatrix(globalVectors);
            globalCoordinates = classicalMDS(distMatrix, 2);
            
            // Atualizar a visualização
            plotScatterplot(globalCoordinates, globalVectors);
            displayVectors(globalVectors);
            
            // Limpar o campo de entrada
            document.getElementById("manualVector").value = "";
        }
        
        // Função para plotar o scatterplot
        function plotScatterplot(coordinates, vectors) {
            // Limpar gráfico anterior
            d3.select("#chart").html("");
            
            const width = 600;
            const height = 400;
            const margin = { top: 20, right: 20, bottom: 30, left: 40 };
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;
            
            // Criar o elemento tooltip
            const tooltip = d3.select("#chart")
                .append("div")
                .attr("class", "tooltip")
                .style("opacity", 0);
            
            // Encontrar os limites dos dados
            const xExtent = d3.extent(coordinates, d => d[0]);
            const yExtent = d3.extent(coordinates, d => d[1]);
            
            // Adicionar um pouco de margem aos limites
            const xRange = xExtent[1] - xExtent[0];
            const yRange = yExtent[1] - yExtent[0];
            const xPadding = xRange * 0.1;
            const yPadding = yRange * 0.1;
            
            // Criar as escalas
            const xScale = d3.scaleLinear()
                .domain([xExtent[0] - xPadding, xExtent[1] + xPadding])
                .range([0, innerWidth]);
                
            const yScale = d3.scaleLinear()
                .domain([yExtent[0] - yPadding, yExtent[1] + yPadding])
                .range([innerHeight, 0]);
                
            // Criar o SVG
            const svg = d3.select("#chart")
                .append("svg")
                .attr("width", width)
                .attr("height", height)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);
                
            // Adicionar os eixos
            svg.append("g")
                .attr("transform", `translate(0,${innerHeight})`)
                .call(d3.axisBottom(xScale));
                
            svg.append("g")
                .call(d3.axisLeft(yScale));
                
            // Adicionar título dos eixos
            svg.append("text")
                .attr("text-anchor", "middle")
                .attr("x", innerWidth / 2)
                .attr("y", innerHeight + margin.bottom)
                .text("Dimensão 1");
                
            svg.append("text")
                .attr("text-anchor", "middle")
                .attr("transform", "rotate(-90)")
                .attr("x", -innerHeight / 2)
                .attr("y", -margin.left + 15)
                .text("Dimensão 2");
                
            // Adicionar os pontos
            svg.selectAll("circle")
                .data(coordinates)
                .enter()
                .append("circle")
                .attr("cx", d => xScale(d[0]))
                .attr("cy", d => yScale(d[1]))
                .attr("r", 5)
                .style("fill", (d, i) => i === vectors.length - 1 && vectors.length > 0 ? "#ff4500" : "#1f77b4") // Destacar o último vetor adicionado manualmente
                .style("opacity", 0.7)
                .style("stroke", (d, i) => i === vectors.length - 1 && vectors.length > 0 ? "#ff4500" : "#0c4a6e")
