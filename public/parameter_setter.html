<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração do Algoritmo Genético</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 500px;
        }

        .config-item {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="range"] {
            width: 100%;
        }
    </style>
</head>

<body>

    <h2>Configuração do Algoritmo Genético</h2>

    <div class="config-item">
        <label for="populationSize">Tamanho da População: <span id="populationSizeValue">300</span></label>
        <input type="range" id="populationSize" data-type="Int" min="10" max="1000" value="300">
    </div>

    <div class="config-item">
        <label for="mutationRate">Taxa de Mutação: <span id="mutationRateValue">0.2</span></label>
        <input type="range" id="mutationRate" data-type="Float" min="0" max="1" step="0.01" value="0.2">
    </div>

    <div class="config-item">
        <label for="mutationSelectionRate">Taxa de Seleção da Mutação: <span
                id="mutationSelectionRateValue">0.1</span></label>
        <input type="range" id="mutationSelectionRate" data-type="Float" min="0" max="1" step="0.01" value="0.1">
    </div>

    <div class="config-item">
        <label for="survivalRate">Taxa de Sobrevivência: <span id="survivalRateValue">0.25</span></label>
        <input type="range" id="survivalRate" data-type="Float" min="0" max="1" step="0.01" value="0.25">
    </div>

    <div class="config-item">
        <label for="nodeIncludeProb">Initial Clique Probability: <span id="nodeIncludeProbValue">0.1</span></label>
        <input type="range" id="nodeIncludeProb" data-type="Float" min="0" max="1" step="0.01" value="0.1">
    </div>

    <div class="config-item">
        <label for="maxAge">Idade Máxima: <span id="maxAgeValue">30</span></label>
        <input type="range" id="maxAge" data-type="Int" min="10" max="100" value="30">
    </div>

    <div class="config-item">
        <label>
            <input type="checkbox" id="hasMaxAge" checked> Usar Idade Máxima
        </label>
    </div>

    <div class="config-item">
        <label>
            <input type="checkbox" id="hasExtractionImprovement" checked> Melhorar Extração
        </label>
    </div>

    <div class="config-item">
        <label>
            <input type="checkbox" id="preventEqualIndividuals"> Prevenir Indivíduos Iguais
        </label>
    </div>
    
    <div class="config-item">
        <label>
            <input type="checkbox" id="calcUpperBound"> Calc Upper Bound (Coloring)
        </label>
    </div>

    

    <!-- <button onclick="getConfig()">Update</button> -->
    <div class="config-item">
        <label>Partial Reset</label>
        <button onclick="sendPartialReset()">Run</button>
    </div>

    <script>

        const socket = new WebSocket("ws://localhost:3214");

        function sendPartialReset(){
            socket.send(JSON.stringify({ act: "command", data: "partialReset" }));
        }

        function updateValue(id, valueId) {
            document.getElementById(valueId).textContent = document.getElementById(id).value;
        }

        

        document.querySelectorAll("input[type=range]").forEach(input => {
            input.addEventListener("input", () => {
                updateValue(input.id, input.id + "Value");
            });
            input.addEventListener("change", () => {
                // updateValue(input.id, input.id + "Value");
                let config = {};
                config[input.id] = window["parse" + input.dataset.type](input.value);
                socket.send(JSON.stringify({ act: "set_parameters", data: config }));
            });
        });
        document.querySelectorAll("input[type=checkbox]").forEach(input => {
            input.addEventListener("change", () => {

                let config = {};
                config[input.id] = input.checked;
                console.log("changed", input.checked);
                socket.send(JSON.stringify({ act: "set_parameters", data: config }));
            });
        });

        // function getConfig() {
        //     const config = {
        //         populationSize: parseInt(document.getElementById("populationSize").value),
        //         mutationRate: parseFloat(document.getElementById("mutationRate").value),
        //         mutationSelectionRate: parseFloat(document.getElementById("mutationSelectionRate").value),
        //         survivalRate: parseFloat(document.getElementById("survivalRate").value),
        //         maxAge: parseInt(document.getElementById("maxAge").value),
        //         hasMaxAge: document.getElementById("hasMaxAge").checked,
        //         hasExtractionImprovement: document.getElementById("hasExtractionImprovement").checked,
        //         preventEqualIndividuals: document.getElementById("preventEqualIndividuals").checked
        //     };

        //     console.log("Configuração Atual:", config);
        //     socket.send(JSON.stringify({ act: "set_parameters", data: config }));
        // }

        function setConfig(config) {
            console.log(config);
            document.getElementById("populationSize").value = config.populationSize;
            document.getElementById("mutationRate").value = config.mutationRate;
            document.getElementById("mutationSelectionRate").value = config.mutationSelectionRate;
            document.getElementById("survivalRate").value = config.survivalRate;
            document.getElementById("maxAge").value = config.maxAge;
            document.getElementById("nodeIncludeProb").value = config.nodeIncludeProb;

            document.getElementById("hasMaxAge").checked = config.hasMaxAge;
            document.getElementById("hasExtractionImprovement").checked = config.hasExtractionImprovement;
            document.getElementById("preventEqualIndividuals").checked = config.preventEqualIndividuals;
            document.getElementById("calcUpperBound").checked = config.calcUpperBound;

            // Atualiza os valores exibidos nos spans
            updateValue("populationSize", "populationSizeValue");
            updateValue("mutationRate", "mutationRateValue");
            updateValue("mutationSelectionRate", "mutationSelectionRateValue");
            updateValue("survivalRate", "survivalRateValue");
            updateValue("maxAge", "maxAgeValue");
        }





        socket.onmessage = function (event) {
            // console.log(event);
            const message = JSON.parse(event.data);

            switch (message.act) {
                case "log":
                    console.log(message.data);
                    break;
                case "data":
                    setConfig(message.data);
                    break;
            }

        };

        socket.onopen = function () {
            console.log("Conectado ao servidor WebSocket");
            socket.send(JSON.stringify({ act: "get_parameters" }));
        };

    </script>

</body>

</html>
